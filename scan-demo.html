<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Warehouse Scanner — Scan</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Header -->
  <header class="header">
    <a class="header-brand" href="scan.html">
      <span class="logo">📦</span>
      <span>Warehouse Scanner</span>
    </a>
    <div class="header-right">
      <span class="header-user" id="header-user"></span>
      <button class="btn btn-ghost btn-sm" onclick="signOut()">Sign Out</button>
    </div>
  </header>

  <div class="container">
    <div class="scan-page">

      <!-- Stats row -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-num" id="today-total">0</div>
          <div class="stat-label">Packed Today</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="today-whatnot">0</div>
          <div class="stat-label">WhatNot Today</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="today-tiktok">0</div>
          <div class="stat-label">TikTok Today</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="hour-rate">—</div>
          <div class="stat-label">Orders / Hour</div>
        </div>
      </div>

      <!-- Scan card -->
      <div class="card">
        <!-- Platform selector -->
        <div class="section-title">Select Platform</div>
        <div class="platform-toggle">
          <button class="platform-btn active-whatnot" id="btn-whatnot" onclick="setPlatform('WhatNot')">
            🟠 WhatNot
          </button>
          <button class="platform-btn" id="btn-tiktok" onclick="setPlatform('TikTok')">
            🎵 TikTok
          </button>
        </div>

        <!-- Scan input -->
        <div class="section-title">Scan Barcode</div>
        <div class="scan-input-wrap">
          <span class="scan-input-icon">🔍</span>
          <input
            type="text"
            id="scan-input"
            class="scan-input"
            placeholder="Scan or type tracking number…"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
          />
        </div>

        <div id="scan-alert" class="alert hidden"></div>
      </div>

      <!-- Recent scans -->
      <div class="recent-scans">
        <div class="section-title">Recent Scans — Today</div>
        <div id="scan-list" class="scan-list">
          <div class="empty-state">
            <div class="icon">📋</div>
            <p>No scans yet today. Start scanning!</p>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    let currentProfile = null;
    let currentPlatform = 'WhatNot';
    let todayScans = [];

    // ---- Init ----
    (async () => {
      currentProfile = {id:"demo",username:"sarah_k",role:"packer"}; // demo
      if (!currentProfile) return;

      document.getElementById('header-user').textContent = '👤 ' + currentProfile.username;
      await loadTodayScans();
      focusScanInput();
    })();

    function focusScanInput() {
      const input = document.getElementById('scan-input');
      input.focus();
      // Re-focus if it loses focus (clicked elsewhere on the page)
      document.addEventListener('click', e => {
        if (!e.target.closest('button') && !e.target.closest('input')) {
          setTimeout(() => input.focus(), 50);
        }
      });
    }

    // ---- Platform toggle ----
    function setPlatform(platform) {
      currentPlatform = platform;
      const btnW = document.getElementById('btn-whatnot');
      const btnT = document.getElementById('btn-tiktok');
      btnW.className = 'platform-btn' + (platform === 'WhatNot' ? ' active-whatnot' : '');
      btnT.className = 'platform-btn' + (platform === 'TikTok' ? ' active-tiktok' : '');
      focusScanInput();
    }

    // ---- Load today's scans ----
    async function loadTodayScans() {
      const { start, end } = todayRange();
      const { data, error } = await db
        .from('scans')
        .select('*')
        .eq('packer_id', currentProfile.id)
        .gte('scanned_at', start)
        .lt('scanned_at', end)
        .order('scanned_at', { ascending: false });

      if (!error && data) {
        todayScans = data;
        renderStats();
        renderRecentScans();
      }
    }

    // ---- Render stats ----
    function renderStats() {
      const total = todayScans.length;
      const whatnot = todayScans.filter(s => s.platform === 'WhatNot').length;
      const tiktok = todayScans.filter(s => s.platform === 'TikTok').length;

      document.getElementById('today-total').textContent = total;
      document.getElementById('today-whatnot').textContent = whatnot;
      document.getElementById('today-tiktok').textContent = tiktok;

      // Orders per hour: scans in last 60 minutes
      if (total > 0) {
        const cutoff = new Date(Date.now() - 3600000).toISOString();
        const recent = todayScans.filter(s => s.scanned_at >= cutoff).length;
        document.getElementById('hour-rate').textContent = recent;
      }
    }

    // ---- Render recent scans list ----
    function renderRecentScans() {
      const list = document.getElementById('scan-list');
      if (todayScans.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="icon">📋</div>
            <p>No scans yet today. Start scanning!</p>
          </div>`;
        return;
      }

      const recent = todayScans.slice(0, 20);
      list.innerHTML = recent.map(s => `
        <div class="scan-item">
          <span class="scan-tracking">${s.tracking_number}</span>
          <span class="badge badge-${s.platform === 'WhatNot' ? 'whatnot' : 'tiktok'}">${s.platform}</span>
          <span class="scan-time">${formatTime(s.scanned_at)}</span>
        </div>
      `).join('');
    }

    // ---- Handle scan submission ----
    const scanInput = document.getElementById('scan-input');
    scanInput.addEventListener('keydown', async (e) => {
      if (e.key === 'Enter') {
        await submitScan();
      }
    });

    // Also handle barcode scanners that send carriage return or fast input
    let scanBuffer = '';
    let scanTimer = null;
    scanInput.addEventListener('input', () => {
      clearTimeout(scanTimer);
      scanBuffer = scanInput.value;
      // Auto-submit after short pause (barcode scanners finish typing quickly)
      scanTimer = setTimeout(async () => {
        if (scanBuffer.length >= 10) {
          await submitScan();
        }
      }, 150);
    });

    async function submitScan() {
      const tracking = scanInput.value.trim();
      if (!tracking) return;

      if (tracking.length < 10) {
        showScanAlert('Tracking number too short. Please scan again.', 'error');
        return;
      }

      // Check for duplicate scan today
      const isDuplicate = todayScans.some(s => s.tracking_number === tracking);
      if (isDuplicate) {
        playBeep('error');
        flashInput('error');
        showScanAlert('⚠️ Already scanned today: ' + tracking, 'error');
        scanInput.value = '';
        return;
      }

      const { data, error } = await db.from('scans').insert({
        packer_id: currentProfile.id,
        packer_username: currentProfile.username,
        tracking_number: tracking,
        platform: currentPlatform,
      }).select().single();

      if (error) {
        playBeep('error');
        flashInput('error');
        showScanAlert('Error saving scan. Try again.', 'error');
        console.error(error);
        return;
      }

      // Success
      playBeep('success');
      flashInput('success');
      hideScanAlert();
      scanInput.value = '';

      todayScans.unshift(data);
      renderStats();
      renderRecentScans();

      showToast(`✓ Scanned ${currentPlatform} — ${tracking.slice(-8)}`, 'success', 2500);
    }

    function flashInput(type) {
      scanInput.classList.remove('flash-success', 'flash-error');
      void scanInput.offsetWidth; // reflow
      scanInput.classList.add(`flash-${type}`);
      setTimeout(() => scanInput.classList.remove(`flash-${type}`), 600);
    }

    function showScanAlert(msg, type) {
      const el = document.getElementById('scan-alert');
      el.className = `alert alert-${type}`;
      el.textContent = msg;
    }

    function hideScanAlert() {
      document.getElementById('scan-alert').className = 'alert hidden';
    }
  </script>
</body>
</html>
